services:
  - type: web
    name: task-tracker-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # set manually in Render dashboard
      - key: CLIENT_ORIGIN
        sync: false  # set to your deployed frontend URL
